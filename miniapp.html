<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inter Nation</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#09080d;
  --surface:#111018;
  --surface2:#19171f;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --gold:#f0b429;
  --gold2:#ffd166;
  --gold3:#e09a10;
  --gold-dim:rgba(240,180,41,0.13);
  --gold-glow:rgba(240,180,41,0.28);
  --text:#f5f0e8;
  --text2:#8b8296;
  --text3:#3d3848;
  --green:#34d399;
  --green-dim:rgba(52,211,153,0.12);
  --red:#f87171;
  --font:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px}
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
#content::-webkit-scrollbar{display:none}
.page{display:none;min-height:100%}
.page.active{display:block;animation:fadeUp 0.22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

#onboard-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background-image:radial-gradient(ellipse at 50% 20%,rgba(240,180,41,0.08),transparent 60%)}
#onboard-screen.hidden{display:none}
.ob-logo{width:80px;height:80px;background:linear-gradient(135deg,#f0b429,#c8860a);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:28px;box-shadow:0 8px 40px rgba(240,180,41,0.35),0 2px 8px rgba(0,0,0,0.4)}
.ob-title{font-size:30px;font-weight:800;text-align:center;letter-spacing:-0.8px;margin-bottom:8px;background:linear-gradient(135deg,#f5e6b8,#f0b429);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ob-sub{color:var(--text2);text-align:center;font-size:14px;line-height:1.7;margin-bottom:40px;max-width:280px}
.ob-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px}
.ob-input{width:100%;padding:16px 18px;background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;color:var(--text);font-size:16px;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.ob-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.ob-input::placeholder{color:var(--text3)}
.ob-btn{padding:17px;background:linear-gradient(135deg,#f0b429,#c8860a);border:none;border-radius:14px;color:#1a1200;font-size:16px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all .15s;box-shadow:0 4px 20px rgba(240,180,41,0.3)}
.ob-btn:active{transform:scale(0.97);opacity:0.9}
.ob-error{color:var(--red);font-size:13px;text-align:center;padding:8px 12px;background:rgba(248,113,113,0.1);border-radius:10px;display:none}

#nav{position:fixed;bottom:0;left:0;right:0;height:68px;background:rgba(9,8,13,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:0.5px;padding:8px 0;transition:color .2s;text-transform:uppercase;height:100%}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{width:22px;height:22px}

.page-header{padding:24px 20px 8px}
.page-h1{font-size:26px;font-weight:800;letter-spacing:-0.6px}
.page-sub{color:var(--text2);font-size:13px;margin-top:3px}

.hero-card{margin:16px;border-radius:22px;background:linear-gradient(135deg,#2a1f00 0%,#1a1200 50%,#0d0b08 100%);padding:24px;position:relative;overflow:hidden;border:1px solid rgba(240,180,41,0.2)}
.hero-card::before{content:'';position:absolute;top:-80px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(240,180,41,0.15),transparent 70%);border-radius:50%}
.hero-card::after{content:'';position:absolute;bottom:-50px;left:-20px;width:160px;height:160px;background:radial-gradient(circle,rgba(240,180,41,0.07),transparent 70%);border-radius:50%}
.hero-hi{font-size:13px;color:rgba(240,180,41,0.6);margin-bottom:4px;font-weight:600;letter-spacing:0.3px;position:relative;z-index:1}
.hero-name{font-size:22px;font-weight:800;letter-spacing:-0.4px;margin-bottom:20px;position:relative;z-index:1;color:var(--text)}
.hero-row{display:flex;gap:10px;position:relative;z-index:1}
.hero-stat{flex:1;background:rgba(240,180,41,0.07);border-radius:13px;padding:12px 10px;border:1px solid rgba(240,180,41,0.1)}
.hero-stat-n{font-size:22px;font-weight:800;letter-spacing:-0.5px;color:var(--gold2)}
.hero-stat-l{font-size:10px;color:rgba(240,180,41,0.55);margin-top:3px;font-weight:600;line-height:1.3}

.sec-lbl{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;padding:0 20px;margin:22px 0 10px}

.next-card{margin:0 16px;background:var(--surface);border:1px solid rgba(240,180,41,0.15);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px}
.next-icon{width:48px;height:48px;background:var(--gold-dim);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.next-info{flex:1;min-width:0}
.next-name{font-weight:700;font-size:15px}
.next-date{color:var(--text2);font-size:13px;margin-top:3px}
.days-chip{background:var(--gold);color:#1a1200;font-size:12px;font-weight:800;padding:5px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.days-chip.soon{background:linear-gradient(135deg,#f0b429,#e07010);animation:glow-pulse 2s infinite}
@keyframes glow-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(240,180,41,0.5)}}

.sched-card{margin:0 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.sched-row{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border);gap:12px}
.sched-row:last-child{border-bottom:none}
.sched-day{font-size:12px;font-weight:800;color:var(--gold);width:30px;flex-shrink:0}
.sched-time{font-size:14px;font-weight:600;flex:1}
.sched-badge{font-size:11px;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:20px}

.lessons-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.l-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.l-num.done{background:var(--green-dim);color:var(--green)}
.l-num.upcoming{background:rgba(240,180,41,0.1);color:var(--text2)}
.l-num.next{background:linear-gradient(135deg,#f0b429,#c8860a);color:#1a1200;box-shadow:0 4px 12px var(--gold-glow)}
.l-info{flex:1;min-width:0}
.l-name{font-weight:700;font-size:14px}
.l-date{color:var(--text2);font-size:12px;margin-top:3px}
.l-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.l-badge.done{background:var(--green-dim);color:var(--green)}
.l-badge.upcoming{background:rgba(255,255,255,0.05);color:var(--text2)}
.l-badge.next{background:var(--gold);color:#1a1200}

.students-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.student-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.student-card:active{background:var(--surface2)}
.ava{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;background:linear-gradient(135deg,#2a1f00,#4a3800);color:var(--gold)}
.s-info{flex:1;min-width:0}
.s-name-row{display:flex;align-items:center;gap:6px}
.s-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-complete-icon{width:16px;height:16px;flex-shrink:0}
.s-sub{color:var(--text2);font-size:12px;margin-top:3px}
.s-icons{display:flex;gap:5px;align-items:center;flex-shrink:0}
.s-icon-link{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;text-decoration:none;flex-shrink:0}
.s-icon-link:active{transform:scale(0.9)}
.s-icon-link.ig{background:rgba(225,48,108,0.15)}
.s-icon-link.tg{background:rgba(41,182,246,0.15)}
.s-icon-link.filled{opacity:1}
.s-icon-link.empty{opacity:0.22;pointer-events:none}
.s-icon-link img{width:16px;height:16px;object-fit:contain;display:block}
.s-arr{color:var(--text3);font-size:20px;font-weight:300;flex-shrink:0}

#detail-screen{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
#detail-screen.open{display:flex;animation:slideIn 0.25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.detail-bar{display:flex;align-items:center;padding:16px 20px 12px;gap:12px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.back-btn{width:38px;height:38px;background:var(--surface);border:1px solid var(--border2);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text);font-size:22px;line-height:1}
.detail-title{font-size:17px;font-weight:800}
.detail-hero{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(240,180,41,0.1),transparent 60%)}
.detail-ava{width:88px;height:88px;border-radius:26px;background:linear-gradient(135deg,#2a1f00,#4a3800);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--gold);box-shadow:0 8px 28px rgba(0,0,0,0.5),0 0 0 1px rgba(240,180,41,0.15);margin-bottom:14px}
.detail-fullname{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.detail-role-lbl{color:var(--text2);font-size:13px;margin-top:4px}
.info-block{margin:0 16px 12px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.info-block-hdr{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.8px;text-transform:uppercase;padding:14px 18px 8px}
.info-row{display:flex;align-items:center;padding:12px 18px;border-top:1px solid var(--border);gap:12px}
.info-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.info-icon img{width:18px;height:18px;object-fit:contain}
.info-body{flex:1;min-width:0}
.info-lbl{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.info-val{font-size:14px;font-weight:500;margin-top:2px}
.info-empty{font-size:14px;color:var(--text3);font-style:italic;margin-top:2px}
.d-social-row{display:flex;gap:10px;margin-top:16px}
.d-social-btn{display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;text-decoration:none;transition:opacity .15s;flex:1;justify-content:center}
.d-social-btn img{width:17px;height:17px;object-fit:contain}
.d-social-btn:active{opacity:0.8}
.d-social-btn.ig{background:rgba(225,48,108,0.15);color:#e1306c}
.d-social-btn.tg{background:rgba(41,182,246,0.15);color:#29b6f6}
.d-social-btn.disabled{opacity:0.25;pointer-events:none}

.profile-top{display:flex;flex-direction:column;align-items:center;padding:24px 20px 20px;background:radial-gradient(ellipse at 50% 0%,rgba(240,180,41,0.1),transparent 60%)}
.my-ava{width:88px;height:88px;border-radius:26px;background:linear-gradient(135deg,#2a1f00,#4a3800);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--gold);box-shadow:0 6px 28px rgba(0,0,0,0.4),0 0 0 1px rgba(240,180,41,0.15)}
.my-name-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}
.my-name-lbl{font-size:20px;font-weight:800;letter-spacing:-0.4px}
.my-profile-check{width:22px;height:22px;display:none}

.lang-section{margin:0 16px 16px}
.lang-lbl{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;display:block}
.lang-row{display:flex;gap:8px}
.lang-btn{flex:1;padding:11px 8px;background:var(--surface);border:1.5px solid var(--border2);border-radius:12px;color:var(--text2);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;text-align:center}
.lang-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.lang-btn:active{transform:scale(0.97)}

.form-block{margin:0 16px 12px}
.form-group{margin-bottom:12px}
.form-lbl{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px;display:block}
.form-inp{width:100%;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border2);border-radius:13px;color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.form-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.form-inp::placeholder{color:var(--text3)}
.save-wrap{padding:0 16px 24px}
.save-btn{width:100%;padding:16px;background:linear-gradient(135deg,#f0b429,#c8860a);border:none;border-radius:14px;color:#1a1200;font-size:16px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all .15s;box-shadow:0 4px 20px rgba(240,180,41,0.25)}
.save-btn:active{transform:scale(0.97);opacity:0.9}
.save-toast{margin-top:12px;padding:12px 16px;background:var(--green-dim);border:1px solid rgba(52,211,153,0.2);border-radius:12px;color:var(--green);font-size:14px;font-weight:600;text-align:center;display:none}
.sync-note{margin:0 16px 12px;padding:12px 16px;background:rgba(240,180,41,0.06);border:1px solid rgba(240,180,41,0.12);border-radius:12px;color:var(--text2);font-size:12px;line-height:1.6;text-align:center}

.offer-page{padding:20px 16px 40px}
.offer-logo-row{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.offer-logo{width:48px;height:48px;background:linear-gradient(135deg,#f0b429,#c8860a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.offer-brand{font-size:20px;font-weight:800;letter-spacing:-0.4px}
.offer-brand-sub{font-size:12px;color:var(--text2);margin-top:2px}
.offer-section{margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.offer-section-hdr{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.offer-section-body{padding:14px 18px;color:var(--text2);font-size:13px;line-height:1.8}
.offer-section-body p{margin-bottom:10px}
.offer-section-body p:last-child{margin-bottom:0}
.offer-section-body strong{color:var(--text);font-weight:600}
.offer-disclaimer{margin-top:24px;padding:14px 16px;background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.15);border-radius:12px;color:var(--text2);font-size:12px;line-height:1.7;text-align:center}
.offer-disclaimer strong{color:var(--red)}

.loading-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-logo{width:72px;height:72px;background:linear-gradient(135deg,#f0b429,#c8860a);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:32px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.95)}}
.loading-txt{color:var(--text2);font-size:13px;font-weight:600}

.gap8{height:8px}.gap16{height:16px}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-logo">📚</div>
  <div class="loading-txt" id="loading-txt">Loading...</div>
</div>

<div id="onboard-screen" class="hidden">
  <div class="ob-logo">📚</div>
  <div class="ob-title">Inter Nation</div>
  <div class="ob-sub" id="ob-sub-text"></div>
  <div class="ob-form">
    <input class="ob-input" id="ob-fn" type="text" autocomplete="given-name" autocorrect="off" autocapitalize="words">
    <input class="ob-input" id="ob-ln" type="text" autocomplete="family-name" autocorrect="off" autocapitalize="words">
    <button class="ob-btn" id="ob-btn-lbl" onclick="doLogin()"></button>
    <div class="ob-error" id="ob-err"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="content">

    <div class="page active" id="page-home">
      <div class="page-header">
        <div class="page-h1" id="home-h1">Hello 👋</div>
        <div class="page-sub" id="home-sub">Inter Nation</div>
      </div>
      <div class="hero-card">
        <div class="hero-hi" id="hero-hi"></div>
        <div class="hero-name" id="hero-name">—</div>
        <div class="hero-row">
          <div class="hero-stat"><div class="hero-stat-n" id="h-days">0</div><div class="hero-stat-l" id="h-days-lbl"></div></div>
          <div class="hero-stat"><div class="hero-stat-n" id="h-lessons">0</div><div class="hero-stat-l" id="h-lessons-lbl"></div></div>
          <div class="hero-stat"><div class="hero-stat-n" id="h-tests">0</div><div class="hero-stat-l" id="h-tests-lbl"></div></div>
        </div>
      </div>
      <div class="sec-lbl" id="lbl-next-test"></div>
      <div id="next-test-wrap"></div>
      <div class="sec-lbl" id="lbl-schedule"></div>
      <div class="sched-card">
        <div class="sched-row"><div class="sched-day" id="sd1"></div><div class="sched-time" id="st1"></div><div class="sched-badge" id="sb1"></div></div>
        <div class="sched-row"><div class="sched-day" id="sd2"></div><div class="sched-time" id="st2"></div><div class="sched-badge" id="sb2"></div></div>
        <div class="sched-row"><div class="sched-day" id="sd3"></div><div class="sched-time" id="st3"></div><div class="sched-badge" id="sb3"></div></div>
      </div>
      <div class="gap16"></div>
    </div>

    <div class="page" id="page-lessons">
      <div class="page-header"><div class="page-h1" id="lessons-h1"></div><div class="page-sub" id="lessons-sub"></div></div>
      <div class="gap16"></div>
      <div class="lessons-list" id="lessons-list"></div>
      <div class="gap16"></div>
    </div>

    <div class="page" id="page-students">
      <div class="page-header"><div class="page-h1" id="students-h1"></div><div class="page-sub" id="students-sub"></div></div>
      <div class="gap16"></div>
      <div class="students-list" id="students-list"></div>
      <div class="gap16"></div>
    </div>

    <div class="page" id="page-profile">
      <div class="page-header"><div class="page-h1" id="profile-h1"></div><div class="page-sub" id="profile-sub"></div></div>
      <div class="profile-top">
        <div class="my-ava" id="my-ava"></div>
        <div class="my-name-row">
          <div class="my-name-lbl" id="my-name-lbl"></div>
          <img class="my-profile-check" id="my-profile-check" src="https://i.postimg.cc/tgq7fghK/free-icon-success-5582932.png" alt="✓">
        </div>
      </div>
      <div class="sync-note" id="sync-note-txt"></div>
      <div class="lang-section">
        <label class="lang-lbl" id="lang-lbl-text"></label>

function L(){ return LANGS[currentLang] || LANGS.en; }

var MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_RU = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
var MONTHS_UZ = ['yanvar','fevral','mart','aprel','may','iyun','iyul','avgust','sentabr','oktabr','noyabr','dekabr'];

function fmtDate(s){
  var d = new Date(s+'T12:00:00');
  var mo = currentLang==='ru' ? MONTHS_RU : currentLang==='uz' ? MONTHS_UZ : MONTHS_EN;
  if(currentLang==='ru') return d.getDate()+' '+mo[d.getMonth()]+' '+d.getFullYear();
  return mo[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

function calcAge(s){
  var bd=new Date(s+'T12:00:00'), now=new Date();
  var age = now.getFullYear()-bd.getFullYear();
  if(now.getMonth()-bd.getMonth()<0 || (now.getMonth()-bd.getMonth()===0 && now.getDate()<bd.getDate())) age--;
  return age;
}

function initials(n){ var p=n.trim().split(' '); return p.length>=2 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : n.substring(0,2).toUpperCase(); }

function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function lsGet(k){ try{ var v=localStorage.getItem(k); return v ? JSON.parse(v) : null; }catch(e){ return null; } }
function sk(n){ return 'ec_' + n.replace(/\s+/g,'_').toLowerCase(); }

function cloudKey(name){ return 'p_' + name.replace(/\s+/g,'_').toLowerCase().substring(0,32); }

function cloudSave(name, data, cb){
  var key = cloudKey(name);
  var val = JSON.stringify({ig:data.instagram||'', tg:data.telegram||'', bd:data.birthday||'', lang:data.lang||'en'});
  if(useCloud){
    tg.CloudStorage.setItem(key, val, function(err){ if(cb) cb(); });
  } else {
    lsSet(key, val);
    if(cb) cb();
  }
}

function cloudLoad(name, cb){
  var key = cloudKey(name);
  if(useCloud){
    tg.CloudStorage.getItem(key, function(err, val){
      if(val){ try{ cb(JSON.parse(val)); return; }catch(e){} }
      cb(null);
    });
  } else {
    var v = lsGet(key);
    cb(v ? (typeof v === 'string' ? JSON.parse(v) : v) : null);
  }
}

function cloudLoadAll(cb){
  if(!useCloud){ cb({}); return; }
  var keys = STUDENTS.map(cloudKey);
  tg.CloudStorage.getItems(keys, function(err, vals){
    var result = {};
    if(vals){
      STUDENTS.forEach(function(name){
        var k = cloudKey(name);
        if(vals[k]){ try{ result[name] = JSON.parse(vals[k]); }catch(e){} }
      });
    }
    cb(result);
  });
}

function getStudentData(name){
  return cloudData[name] || null;

function doLogin(){
  var fn  = (document.getElementById('ob-fn').value||'').trim();
  var ln  = (document.getElementById('ob-ln').value||'').trim();

  var t   = L();
  err.style.display = 'none';
  if(!fn||!ln){ err.textContent=t.ob_err_empty; err.style.display='block'; return; }
  var full  = fn+' '+ln;
  var match = null;
  for(var i=0;i<STUDENTS.length;i++){
    if(STUDENTS[i].toLowerCase()===full.toLowerCase()){ match=STUDENTS[i]; break; }
  }
  if(!match){ err.textContent=t.ob_err_notfound; err.style.display='block'; return; }
  currentUser = match;
  lsSet('ec_user', match);
  document.getElementById('loading-overlay').style.display = 'flex';
  cloudLoad(match, function(data){
    if(data){ cloudData[match] = data; }
    cloudLoadAll(function(allData){
      Object.assign(cloudData, allData);
      if(cloudData[match]) cloudData[match] = cloudData[match];
      launchApp();
    });
  });
}

function calcStats(){
  var now = new Date(); now.setHours(0,0,0,0);
  var start = new Date(CLASS_START); start.setHours(0,0,0,0);
  var days = Math.max(0, Math.floor((now - start) / 86400000) + 1);
  var lessons = 0;
  var d = new Date(start);
  while(d <= now){ var dw=d.getDay(); if(dw===2||dw===4||dw===6) lessons++; d.setDate(d.getDate()+1); }
  var tests = 0;
  for(var i=0;i<UNIT_TESTS.length;i++){
    if(new Date(UNIT_TESTS[i].date+'T00:00:00') < now) tests++;
  }
  return {days:days, lessons:lessons, tests:tests};
}

  document.getElementById('h-days').textContent    = s.days;
  document.getElementById('h-lessons').textContent = s.lessons;
  document.getElementById('h-tests').textContent   = s.tests;
  document.getElementById('h-days-lbl').textContent    = t.h_days;
  document.getElementById('h-lessons-lbl').textContent = t.h_lessons;
  document.getElementById('h-tests-lbl').textContent   = t.h_tests;

  var now  = new Date(); now.setHours(0,0,0,0);
  var next = null;
  for(var i=0;i<UNIT_TESTS.length;i++){
    var d = new Date(UNIT_TESTS[i].date+'T00:00:00');
    if(d >= now){ next = UNIT_TESTS[i]; break; }
  }
  var wrap = document.getElementById('next-test-wrap');
  if(!next){
    wrap.innerHTML = '<div style="margin:0 16px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:16px;color:var(--text2);font-size:14px;text-align:center">'+t.all_done+'</div>';
    return;
  }
  var d2   = new Date(next.date+'T00:00:00');
  var diff = Math.round((d2 - now) / 86400000);
  var cc   = diff <= 3 ? 'days-chip soon' : 'days-chip';
  var lbl  = diff === 0 ? t.chip_today : diff === 1 ? t.chip_tomorrow : diff + t.chip_days;
  wrap.innerHTML = '<div class="next-card"><div class="next-icon">📝</div><div class="next-info"><div class="next-name">'+next.unit+'</div><div class="next-date">'+fmtDate(next.date)+'</div></div><div class="'+cc+'">'+lbl+'</div></div>';
}

function buildLessons(){
  var t   = L();
  var now = new Date(); now.setHours(0,0,0,0);
  var foundNext = false, html = '';
  for(var i=0;i<UNIT_TESTS.length;i++){
    var ut   = UNIT_TESTS[i];
    var d    = new Date(ut.date+'T00:00:00');
    var done = d < now;
    var isNext = !done && !foundNext;
    if(isNext) foundNext = true;
    var c = done ? 'done' : (isNext ? 'next' : 'upcoming');
    var b = done ? t.badge_done : (isNext ? t.badge_next : t.badge_upcoming);
    html += '<div class="lesson-card"><div class="l-num '+c+'">'+(i+1)+'</div><div class="l-info"><div class="l-name">'+ut.unit+'</div><div class="l-date">'+fmtDate(ut.date)+'</div></div><div class="l-badge '+c+'">'+b+'</div></div>';
  }
  document.getElementById('lessons-list').innerHTML = html;
}

function buildStudents(){
  var t = L();
  var html = '';
  for(var i=0;i<STUDENTS.length;i++){
    var name  = STUDENTS[i];
    var d     = cloudData[name] || {};
    var hasIg = !!(d.ig && d.ig.trim());
    var hasTg = !!(d.tg && d.tg.trim());
    var hasBd = !!(d.bd && d.bd.trim());
    var igHref = hasIg ? 'https://instagram.com/'+d.ig.replace('@','').trim() : '#';
    var tgHref = hasTg ? 'https://t.me/'+d.tg.replace('@','').trim() : '#';
    var igCls = 's-icon-link ig '+(hasIg?'filled':'empty');
    var tgCls = 's-icon-link tg '+(hasTg?'filled':'empty');
    var checkHtml = isComplete(d) ? '<img class="s-complete-icon" src="'+IC_CHECK+'" alt="✓">' : '';
    var subParts = [];
    if(hasBd){ subParts.push(fmtDate(d.bd)); }
    if(hasBd){ var age = calcAge(d.bd); subParts.push(age + t.years_old.trim()); }
    var subTxt = subParts.length ? subParts.join(' · ') : 'Inter Nation';
    var safe = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<div class="student-card">';
    html += '<div class="ava" onclick="openDetail(\''+safe+'\')">'+initials(name)+'</div>';
    html += '<div class="s-info" onclick="openDetail(\''+safe+'\')"><div class="s-name-row"><div class="s-name">'+name+'</div>'+checkHtml+'</div><div class="s-sub">'+subTxt+'</div></div>';
    html += '<div class="s-icons">';
    if(hasIg) html += '<a class="'+igCls+'" href="'+igHref+'" target="_blank"><img src="'+IC_IG+'" alt="ig"></a>';
    else      html += '<span class="'+igCls+'"><img src="'+IC_IG+'" alt="ig"></span>';
    if(hasTg) html += '<a class="'+tgCls+'" href="'+tgHref+'" target="_blank"><img src="'+IC_TG+'" alt="tg"></a>';
    else      html += '<span class="'+tgCls+'"><img src="'+IC_TG+'" alt="tg"></span>';
    html += '</div>';
    html += '<div class="s-arr" onclick="openDetail(\''+safe+'\')">›</div>';
    html += '</div>';
  }
  document.getElementById('students-list').innerHTML = html;
}

function openDetail(name){
  var t     = L();
  var d     = cloudData[name] || {};
  document.getElementById('d-name').textContent = name;
  document.getElementById('d-ava').textContent = initials(name);

  var hasIg  = !!(d.ig && d.ig.trim());
  var hasTg  = !!(d.tg && d.tg.trim());
  var igHref = hasIg ? 'https://instagram.com/'+d.ig.replace('@','').trim() : '#';
  var tgHref = hasTg ? 'https://t.me/'+d.tg.replace('@','').trim() : '#';

  var sr = '';
  sr += hasIg
    ? '<a class="d-social-btn ig" href="'+igHref+'" target="_blank"><img src="'+IC_IG+'"> Instagram</a>'
    : '<div class="d-social-btn ig disabled"><img src="'+IC_IG+'"> Instagram</div>';
  sr += hasTg
    ? '<a class="d-social-btn tg" href="'+tgHref+'" target="_blank"><img src="'+IC_TG+'"> Telegram</a>'
    : '<div class="d-social-btn tg disabled"><img src="'+IC_TG+'"> Telegram</div>';
  document.getElementById('d-social-row').innerHTML = sr;

  function sf(id, val){
    var el = document.getElementById(id);
    el.innerHTML = val
      ? '<div class="info-val">'+val+'</div>'
      : '<div class="info-empty">'+t.not_set+'</div>';
  }
  sf('d-ig', d.ig||'');
  sf('d-tg', d.tg||'');
  if(d.bd){ sf('d-bd', fmtDate(d.bd)); sf('d-age', calcAge(d.bd)+t.years_old); }
  else { sf('d-bd',''); sf('d-age',''); }

  var ds = document.getElementById('detail-screen');
  ds.classList.add('open');
  ds.scrollTop = 0;
}

function closeDetail(){
  document.getElementById('detail-screen').classList.remove('open');
}

function saveProfile(){
  var t  = L();
  var ig = document.getElementById('f-ig').value.trim();
  var tgv= document.getElementById('f-tg').value.trim();
  var bd = document.getElementById('f-bd').value;
  var data = {ig:ig, tg:tgv, bd:bd, lang:currentLang};
  cloudData[currentUser] = data;
  cloudSave(currentUser, {instagram:ig, telegram:tgv, birthday:bd, lang:currentLang}, function(){
    refreshProfileCheck();
    buildStudents();
    var toast = document.getElementById('save-toast');
    toast.textContent = t.save_ok;
    toast.style.display = 'block';
    setTimeout(function(){ toast.style.display='none'; }, 2500);
  });
}

function goPage(name){
  for(var i=0;i<PAGES.length;i++){
    var p = PAGES[i];
    document.getElementById('page-'+p).classList[p===name?'add':'remove']('active');
    document.getElementById('nb-'+p).classList[p===name?'add':'remove']('active');
  }
  document.getElementById('content').scrollTop = 0;
}

(function(){
  var saved = lsGet('ec_user');
  if(saved){
    for(var i=0;i<STUDENTS.length;i++){
      if(STUDENTS[i] === saved){
        currentUser = saved;
        document.getElementById('loading-txt').textContent = LANGS[currentLang].loading;
        cloudLoad(saved, function(data){
          if(data){
            cloudData[currentUser] = data;
            if(data.lang) currentLang = data.lang;
          }
          cloudLoadAll(function(allData){
            Object.assign(cloudData, allData);
            launchApp();
          });
        });
        return;
      }
    }
    lsSet('ec_user', null);
  }
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('onboard-screen').classList.remove('hidden');
})();
